<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#722F37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sommely" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/IMG_1639-transparent.png" />
    <link rel="apple-touch-icon" href="/IMG_1639-transparent.png" />
    <link rel="shortcut icon" href="/IMG_1639-transparent.png" />
    <!-- SEO -->
    <meta name="description" content="Scannez une étiquette de vin et recevez votre score personnalisé en 3 secondes. Votre sommelier IA personnel — accords mets & vins, cave virtuelle, carte restaurant." />
    <meta name="keywords" content="sommelier IA, scanner vin, score vin personnalisé, cave virtuelle, accord mets vins, Vivino alternative" />
    <meta property="og:title" content="Sommely — Le Yuka du vin" />
    <meta property="og:description" content="Scannez une bouteille, recevez votre score personnalisé. Sommelier IA, cave virtuelle, carte restaurant." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sommely.shop" />
    <title>Sommely — Le Yuka du vin</title>
    <meta name="build" content="2025-03-04" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash" style="position:fixed;inset:0;background:#722F37;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
      <img src="/IMG_1639-transparent.png" alt="Sommely" width="120" height="120" style="filter:brightness(0) invert(1);object-fit:contain;" onerror="this.src='/Logo%20Sommely.jpeg';this.style.filter='brightness(0) invert(1)';">
      <p style="color:rgba(255,255,255,0.8);font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;margin-top:1rem;">Sommely</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Fallback: retire le splash après 2.5s si React ne l'a pas fait (évite blocage des clics) -->
    <script>
      setTimeout(function(){var s=document.getElementById('splash');if(s){s.style.pointerEvents='none';s.remove();}},2500);
    </script>
  </body>
</html>
